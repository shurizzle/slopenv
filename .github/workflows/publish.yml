name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Necessario per l'autenticazione OIDC (senza token)
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --include=dev --no-audit --no-fund

      - name: Check
        run: npm run check:ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
